group 'com.tejasmehta.dargon2_flutter'
version '1.0'

buildscript {
    repositories {
        google()
        jcenter()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.0.2'
    }
}

rootProject.allprojects {
    repositories {
        google()
        jcenter()
    }
}

apply plugin: 'com.android.library'

android {
    compileSdkVersion 29
    namespace 'com.tejasmehta.dargon2_flutter_mobile'
    externalNativeBuild {
        // Argon2 Library build Configuration
        cmake {
            path "CMakeLists.txt"
        }
    }

    defaultConfig {
        // Bumped from 16 → 21 because the modern Android NDK (used to build
        // libargon2-arm.so via CMakeLists.txt) refuses minSdk < 21 with
        // CXX1110 ("undefined behavior"). Flutter itself requires minSdk
        // >= 21 since Flutter 3.x, so this does not regress any real users.
        minSdkVersion 21
    }
    lintOptions {
        disable 'InvalidPackage'
    }
}
